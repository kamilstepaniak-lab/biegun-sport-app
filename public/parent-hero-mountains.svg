<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMax slice" fill="none">
  <defs>
    <!-- poziomy fade: lewa strona (tytuł) jaśniejsza, prawa pełna -->
    <linearGradient id="hFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#fff" stop-opacity="0.72"/>
      <stop offset="0.64" stop-color="#fff" stop-opacity="1"/>
    </linearGradient>
    <!-- pionowy fade: podstawy gór rozpływają się w sekcję poniżej -->
    <linearGradient id="vFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="1"/>
    </linearGradient>
    <mask id="fadeMask">
      <rect width="1200" height="320" fill="url(#hFade)"/>
      <rect width="1200" height="320" fill="url(#vFade)"/>
    </mask>
  </defs>

  <g mask="url(#fadeMask)">
    <!-- najdalszy grzbiet: delikatna sylwetka przez całą szerokość -->
    <path d="M0 320 L0 200 L120 150 L260 190 L400 130 L560 175 L720 120 L880 160 L1040 110 L1200 150 L1200 320 Z" fill="#e9f1fb"/>

    <!-- środkowy grzbiet -->
    <path d="M0 320 L0 235 L180 175 L360 220 L520 165 L700 210 L860 150 L1020 200 L1200 165 L1200 320 Z" fill="#dbe8f9"/>

    <!-- szczyt lewy -->
    <polygon points="180,320 300,140 300,320" fill="#cbddf6"/>
    <polygon points="300,140 420,320 300,320" fill="#b2cdf0"/>
    <polygon points="282,170 300,140 318,170" fill="#eff5ff"/>

    <!-- szczyt główny (wysoki, centralny) -->
    <polygon points="470,320 620,100 620,320" fill="#cbdcf4"/>
    <polygon points="620,100 770,320 620,320" fill="#b2cdf0"/>
    <polygon points="598,140 620,100 642,140" fill="#eff5ff"/>

    <!-- szczyt prawy -->
    <polygon points="820,320 930,130 930,320" fill="#d0e0f6"/>
    <polygon points="930,130 1040,320 930,320" fill="#bcd4f2"/>
    <polygon points="911,160 930,130 949,160" fill="#f1f6ff"/>

    <!-- grzbiet skrajny prawy -->
    <polygon points="1000,320 1080,175 1080,320" fill="#c3d8f2"/>
    <polygon points="1080,175 1160,320 1080,320" fill="#adcaee"/>
  </g>
</svg>

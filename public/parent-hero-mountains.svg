<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" fill="none">
  <defs>
    <!-- delikatny fade po lewej, żeby tytuł był czytelny -->
    <linearGradient id="hFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.16" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="0.4" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#fff" stop-opacity="1"/>
    </linearGradient>
    <mask id="fadeMask">
      <rect width="1200" height="200" fill="url(#hFade)"/>
    </mask>
  </defs>

  <g mask="url(#fadeMask)">
    <!-- najdalszy grzbiet -->
    <path d="M0 200 L0 120 L150 95 L300 120 L450 80 L620 110 L780 70 L940 105 L1100 75 L1200 100 L1200 200 Z" fill="#dceafa"/>

    <!-- środkowy grzbiet -->
    <path d="M0 200 L0 150 L180 110 L360 145 L540 100 L720 140 L900 95 L1080 135 L1200 110 L1200 200 Z" fill="#cadff5"/>

    <!-- szczyt 1 -->
    <polygon points="180,200 300,70 300,200" fill="#c2d6f0"/>
    <polygon points="300,70 420,200 300,200" fill="#a8c6ec"/>
    <polygon points="280,100 300,70 320,100" fill="#ffffff"/>

    <!-- szczyt 2 (najwyższy) -->
    <polygon points="480,200 640,45 640,200" fill="#c2d6f0"/>
    <polygon points="640,45 800,200 640,200" fill="#a8c6ec"/>
    <polygon points="616,82 640,45 664,82" fill="#ffffff"/>

    <!-- szczyt 3 -->
    <polygon points="840,200 940,75 940,200" fill="#c8daf2"/>
    <polygon points="940,75 1040,200 940,200" fill="#b2ceee"/>
    <polygon points="921,103 940,75 959,103" fill="#f4f8ff"/>

    <!-- grzbiet skrajny prawy -->
    <polygon points="1010,200 1090,110 1090,200" fill="#bcd2f0"/>
    <polygon points="1090,110 1170,200 1090,200" fill="#a4c2ea"/>
  </g>
</svg>
